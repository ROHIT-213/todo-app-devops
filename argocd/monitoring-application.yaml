apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 70.4.1
    helm:
      values: |
        alertmanager:
          alertmanagerSpec:
            envFrom:
              - secretRef:
                  name: monitoring-credentials
          config:
            global:
              resolve_timeout: 5m
            route:
              receiver: 'slack-notifications'
            receivers:
              - name: 'slack-notifications'
                slack_configs:
                  - channel: '#alerts-devops'
                    api_url: ${SLACK_WEBHOOK_URL}
                    send_resolved: true
        prometheus:
          prometheusSpec:
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp2
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 10Gi
        grafana:
          admin:
            existingSecret: monitoring-credentials
            userKey: admin-user
            passwordKey: grafana-password
          persistence:
            enabled: false
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # - Replace=true

      
