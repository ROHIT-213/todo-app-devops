apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: todo-app-vpa
  namespace: todo-app
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: todo-app-deployment
  updatePolicy:
    # "Off" means Recommendation Mode. It calculates the optimal 
    # resource requests but lets HPA do the actual scaling.
    updateMode: "auto" 
  resourcePolicy:
    containerPolicies:
      - containerName: '*'
        minAllowed:
          cpu: 50m
          memory: 64Mi
        maxAllowed:
          cpu: 1000m
          memory: 1024Mi