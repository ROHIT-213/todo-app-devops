version: 2.1

orbs:
  aws-cli: circleci/aws-cli@3.1.3
  docker: circleci/docker@2.2.0

jobs:
  build:
    description: Build and test the application
    docker:
      - image: cimg/node:16.20
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package.json" }}
            - v1-dependencies-
      - run:
          name: Install dependencies
          command: npm install
      - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-{{ checksum "package.json" }}
      - run:
          name: Run tests
          # command: npm test -- --coverage --watchAll=false
          command: npm test -- --watchAll=false --passWithNoTests
      - run:
          name: Build application
          command: npm run build
      - persist_to_workspace:
          root: .
          paths:
            - build
            - package.json
            - Dockerfile
            - .dockerignore

  push_image:
    description: Build and push Docker image to registry
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - attach_workspace:
          at: .
      
      # - setup_remote_docker:
      #     version: 20.10.7
      - run:
          name: verify Docker
          command: docker --version
      - run:
          name: Build Docker image
          command: |
            docker build -t rohit213/project-app:$CIRCLE_SHA1 .
            docker tag rohit213/project-app:$CIRCLE_SHA1 rohit213/project-app:latest
      - run:
          name: DockerHub Login 
          command: | 
            echo $DOCKERHUB_PASSWORD | docker login -u $DOCKERHUB_USERNAME --password-stdin
      - run:
          name: Push Docker image 
          command: | 
            docker push rohit213/project-app:$CIRCLE_SHA1 
            docker push rohit213/project-app:latest
      
      - attach_workspace:
          at: .
      - persist_to_workspace:
          root: .
          paths:
            - .

  deploy_infrastructure:
    description: Deploy AWS infrastructure using Terraform
    docker:
      - image: hashicorp/terraform:latest
    steps:
      - checkout
      - aws-cli/setup
      - run:
          name: Initialize Terraform
          command: |
            cd terraform
            terraform init -upgrade
      - run:
          name: Validate Terraform
          command: |
            cd terraform
            terraform validate
      - run:
          name: Plan Terraform
          command: |
            cd terraform
            terraform plan -var-file="terraform.tfvars" -out=tfplan
      - persist_to_workspace:
          root: .
          paths:
            - terraform/tfplan

  apply_infrastructure:
    description: Apply Terraform changes to AWS
    docker:
      - image: hashicorp/terraform:latest
    steps:
      - checkout
      - attach_workspace:
          at: .
      - aws-cli/setup
      - run:
          name: Initialize Terraform
          command: |
            cd terraform
            terraform init -upgrade
      - run:
          name: Apply Terraform
          command: |
            cd terraform
            terraform apply -auto-approve tfplan
      - run:
          name: Export Terraform outputs
          command: |
            cd terraform
            terraform output -json > ../terraform_outputs.json

      # =========================================================================
      # AUTOMATED SECURE MONITORING DEPLOYMENT EXTRA STEP
      # =========================================================================
      - run:
          name: Deploy Secure Observability & Alerting Stack
          command: |
            # 1. Download and configure kubectl manually inside this Terraform runner environment
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/

            # 2. Authenticate with your freshly provisioned AWS EKS cluster
            aws eks update-kubeconfig --region ap-south-1 --name todo-app-eks

            # 3. Pre-create monitoring namespace if it doesn't exist
            kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

            # 4. Use an inline sed parsing method to replace placeholders securely
            # This generates our live Secret object without requiring gettext/envsubst packages
            sed -e "s|\${GRAFANA_ADMIN_PASSWORD}|$GRAFANA_ADMIN_PASSWORD|g" \
                -e "s|\${SLACK_WEBHOOK_URL}|$SLACK_WEBHOOK_URL|g" \
                Monitoring/monitoring-secrets.tmpl.yaml > k8s/monitoring-secrets.yaml

            # 5. Instantly apply the secrets definition inside your cluster namespace
            kubectl apply -f k8s/monitoring-secrets.yaml

            # 6. Clean up the parsed file from disk memory space immediately for security
            rm k8s/monitoring-secrets.yaml

            # 7. Apply the declarative monitoring manifests
            kubectl apply -f argocd/monitoring-application.yaml
            # kubectl apply -f Monitoring/prometheus-alerts.yaml
      # =========================================================================
      - persist_to_workspace:
          root: .
          paths:
            - terraform_outputs.json

  update_k8s_manifests:
    description: Update Kubernetes manifests with new image tag
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - add_ssh_keys:
          fingerprints:
            - "SHA256:tuVaE4x16JWn8TkGzn7FBv9UaM8NlVyewF5BDunpxKc"
      - attach_workspace:
          at: .
      - run:
          name: Update deployment image
          command: |
            sed -i "s|image: .*|image: rohit213/project-app:$CIRCLE_SHA1|g" k8s/deployment.yaml
      - run:
          name: Commit and push changes
          command: |
            git config user.email "circleci@todoapp.com"
            git config user.name "CircleCI Bot"
            git add k8s/deployment.yaml
            git commit -m "Update image tag to $CIRCLE_SHA1 [skip ci]" || true
            git push origin $CIRCLE_BRANCH
      - persist_to_workspace:
          root: .
          paths:
            - k8s

  deploy_argocd:
    description: Deploy or sync ArgoCD application
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - attach_workspace:
          at: .
      # --- ADDING STEPS TO FIX THE UNZIP ERROR ---
      - run:
          name: Install System Utilities (unzip)
          command: |
            sudo apt-get update && sudo apt-get install -y unzip
      # --------------------------------------------
      - aws-cli/setup
      - run:
          name: Install kubectl
          command: |
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/
      - run:
          name: Install ArgoCD CLI
          command: |
            curl -sSL -o /tmp/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
            chmod +x /tmp/argocd
            sudo mv /tmp/argocd /usr/local/bin/
      - run:
          name: Configure kubectl
          command: |
            aws eks update-kubeconfig --region $AWS_REGION --name todo-app-eks
      - run:
          name: Create ArgoCD Application
          command: |
            kubectl apply -f argocd/application.yaml
      - run:
          name: Login to ArgoCD
          command: |
            argocd login $ARGOCD_SERVER \
            --username admin \
            --password $ARGOCD_PASSWORD \
            --insecure \
            --grpc-web
      - run:
          name: Sync ArgoCD Application
          command: |
            echo "Starting ArgoCD sync..."
            argocd app sync todo-app --grpc-web || true

            echo "Waiting for application to sync..."

            argocd app wait todo-app --grpc-web --timeout 180
      - run:
          name: Wait for deployment
          command: |
            kubectl rollout status deployment/todo-app-deployment -n todo-app --timeout=5m

workflows:
  version: 2
  
  build_and_push:
    jobs:
      - build:
          filters:
            branches:
              only: main
      - push_image:
          requires:
            - build
          filters:
            branches:
              only: main
      - update_k8s_manifests:
          requires:
            - push_image
          filters:
            branches:
              only: main
      - hold_deploy:
          type: approval
          requires:
            - update_k8s_manifests
          filters:
            branches:
              only: main
      - deploy_argocd:
          requires:
            - hold_deploy
          filters:
            branches:
              only: main

  infrastructure:
    jobs:
      - deploy_infrastructure:
          filters:
            branches:
              only: infrastructure
      - hold_apply:
          type: approval
          requires:
            - deploy_infrastructure
          filters:
            branches:
              only: infrastructure
      - apply_infrastructure:
          requires:
            - hold_apply
          filters:
            branches:
              only: infrastructure
