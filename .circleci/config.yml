version: 2.1

orbs:
  aws-cli: circleci/aws-cli@3.1.3
  docker: circleci/docker@2.2.0

jobs:
  build:
    docker:
      - image: cimg/node:16.20
    steps:
      - checkout
      - run: npm install
      - run: npm test -- --watchAll=false --passWithNoTests
      - run: npm run build
      - persist_to_workspace:
          root: .
          paths: [build, package.json, Dockerfile, .dockerignore]

  push_image:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Build and Push Docker image
          command: |
            echo $DOCKERHUB_PASSWORD | docker login -u $DOCKERHUB_USERNAME --password-stdin
            docker build -t $DOCKERHUB_USERNAME/project-app:$CIRCLE_SHA1 .
            docker tag $DOCKERHUB_USERNAME/project-app:$CIRCLE_SHA1 $DOCKERHUB_USERNAME/project-app:latest
            docker push $DOCKERHUB_USERNAME/project-app:$CIRCLE_SHA1
            docker push $DOCKERHUB_USERNAME/project-app:latest

  deploy_infrastructure:
    docker:
      - image: cimg/base:stable 
    steps:
      - checkout
      - aws-cli/setup
      - run:
          name: Install Terraform (Conflict-Free)
          command: |
            if ! command -v terraform &> /dev/null; then
              # Download to a temporary file
              sudo curl -Lo /tmp/terraform.zip https://releases.hashicorp.com/terraform/1.5.7/terraform_1.5.7_linux_amd64.zip
              # Unzip into a temporary directory to avoid the "Is a directory" error
              sudo unzip -o /tmp/terraform.zip -d /tmp/terraform_bin
              # Move the actual binary to your path
              sudo mv /tmp/terraform_bin/terraform /usr/local/bin/
              # Clean up
              sudo rm -rf /tmp/terraform_bin /tmp/terraform.zip
            fi
            terraform --version
      - run:
          name: Terraform Plan
          command: |
            cd terraform
            terraform init -upgrade
            terraform validate
            # Remove gp2 from state if present — managed via kubectl, not Terraform
            terraform state rm kubernetes_storage_class_v1.gp2 2>/dev/null || true
            # Clear stale DynamoDB lock from any previously failed pipeline run
            aws dynamodb delete-item \
              --table-name terraform-locks \
              --key '{"LockID": {"S": "todo-app-terraform-state-2809/eks/terraform.tfstate"}}' \
              --region ap-south-1 2>/dev/null || true
            terraform plan -var="aws_region=$AWS_REGION" -var="cluster_name=todo-app-eks" -var-file="terraform.tfvars" -out=tfplan

      - persist_to_workspace:
          root: .
          paths:
            - terraform/tfplan

  apply_infrastructure:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - attach_workspace:
          at: .
      - aws-cli/setup
      - run:
          name: Install Terraform (Conflict-Free)
          command: |
            if ! command -v terraform &> /dev/null; then
              sudo curl -Lo /tmp/terraform.zip https://releases.hashicorp.com/terraform/1.5.7/terraform_1.5.7_linux_amd64.zip
              sudo unzip -o /tmp/terraform.zip -d /tmp/terraform_bin
              sudo mv /tmp/terraform_bin/terraform /usr/local/bin/
              sudo rm -rf /tmp/terraform_bin /tmp/terraform.zip
            fi
      - run:
          name: Install kubectl
          command: |
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && sudo mv kubectl /usr/local/bin/
      - run:
          name: Terraform Apply
          command: |
            cd terraform
            terraform init -upgrade
            terraform apply -auto-approve tfplan
      - run:
          name: Apply gp2 StorageClass
          command: |
            aws eks update-kubeconfig --region $AWS_REGION --name todo-app-eks
            # --dry-run=client first to verify, then apply (--force replaces if already exists)
            kubectl apply -f terraform/gp2-storageclass.yaml --force
      - run:
          name: Export Outputs
          command: |
            cd terraform
            terraform output -json > ../terraform_outputs.json
      - persist_to_workspace:
          root: .
          paths:
            - terraform_outputs.json

  update_k8s_manifests:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - add_ssh_keys:
          fingerprints: ["SHA256:tuVaE4x16JWn8TkGzn7FBv9UaM8NlVyewF5BDunpxKc"]
      - run:
          name: Update Deployment Tag
          command: |
            sed -i "s|image: .*|image: $DOCKERHUB_USERNAME/project-app:$CIRCLE_SHA1|g" k8s/deployment.yaml
            git config user.email "circleci@bot.com"
            git config user.name "CircleCI Bot"
            git add k8s/deployment.yaml
            git commit -m "Update image tag to $CIRCLE_SHA1 [skip ci]" || true
            git push origin $CIRCLE_BRANCH

  deploy_argocd:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - aws-cli/setup
      - run:
          name: Install kubectl & ArgoCD CLI
          command: |
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && sudo mv kubectl /usr/local/bin/
            curl -sSL -o /tmp/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
            chmod +x /tmp/argocd && sudo mv /tmp/argocd /usr/local/bin/
      - run:
          name: Sync ArgoCD
          command: |
            aws eks update-kubeconfig --region $AWS_REGION --name todo-app-eks
            argocd login $ARGOCD_SERVER --username admin --password $ARGOCD_PASSWORD --insecure --grpc-web
            argocd app sync todo-app --grpc-web

workflows:
  infrastructure_workflow:
    jobs:
      - deploy_infrastructure:   
          filters: { branches: { only: infrastructure } }
      - hold_apply:
          type: approval
          requires: [deploy_infrastructure]
          filters: { branches: { only: infrastructure } }
      - apply_infrastructure:
          requires: [hold_apply]
          filters: { branches: { only: infrastructure } }

  app_workflow:
    jobs:
      - build:
          filters: { branches: { only: main } }
      - push_image:
          requires: [build]
      - update_k8s_manifests:
          requires: [push_image]
      - hold_deploy:
          type: approval
          requires: [update_k8s_manifests]
      - deploy_argocd:
          requires: [hold_deploy]









