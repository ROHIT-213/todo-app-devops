# monitoring/values.yaml
# Prometheus Configuration
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "40GB"
    resources:
      requests:
        memory: 2Gi
        cpu: 500m
      limits:
        memory: 4Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    # Scrape all ServiceMonitors across all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

# Grafana Configuration
grafana:
  admin:
    existingSecret: monitoring-credentials
    userKey: admin-user
    passwordKey: grafana-password
  persistence:
    enabled: true
    storageClassName: gp2
    accessModes: ["ReadWriteOnce"]
    size: 10Gi
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

# Alertmanager Configuration
alertmanager:
  enabled: true
  persistence:
    enabled: true
    storageClassName: gp2
    accessModes: ["ReadWriteOnce"]
    size: 10Gi
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

  # Global routing configuration and Slack notification receiver definition
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['alertname', 'cluster', 'service']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: 'slack-notifications'
      receivers:
        - name: 'slack-notifications'
          slack_configs:
            - channel: '#alerts-devops'
              # Safely pulls the secret value directly out of your credentials secret object
              api_url_secret:
                name: monitoring-credentials
                key: slack-webhook-url
              send_resolved: true
# Tells the Helm template builder to force parse the root config block into the Alertmanager spec
tplConfig: true

crds:
  enabled: true

coreDns:
  enabled: true 
  service:
    enabled: false  # Disables creating the service in kube-system

kubeControllerManager:
  enabled: false    # EKS manages this; you can safely turn it off

kubeScheduler:
  enabled: false    # EKS manages this; turn it off

kubeEtcd:
  enabled: false    # EKS manages this; turn it off

kubeProxy:
  enabled: false    # Turn off or set service.enabled to false if it attempts targeting kube-system







